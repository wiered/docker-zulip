# Zulip для Coolify (Docker Compose из приватного Git-репозитория).
#
# Образ Zulip — только готовый ghcr.io/zulip/zulip-server (без build на сервере): деплой — в основном
# docker pull, без компиляции и с меньшими требованиями к RAM. Версию тега меняйте в image: ниже.
#
# Настройка Coolify
# - Build Pack: Docker Compose; базовая директория — корень репозитория; файл: compose.coolify.yaml.
# - Приватный GitHub: Deploy Key или GitHub App с доступом к репозиторию.
# - Сервис в compose должен называться «zulip», чтобы работали magic-переменные SERVICE_FQDN_ZULIP / SERVICE_URL_ZULIP
#   (нужен Coolify v4.0.0-beta.411+ для compose из Git; см. документацию Coolify).
# - В UI у сервиса zulip укажите домен и порт контейнера 80 (TLS терминирует прокси Coolify).
#
# Переменные окружения (задайте в Coolify; секреты не попадают в env контейнера zulip — только через Docker secrets):
#   ZULIP__POSTGRES_PASSWORD, ZULIP__MEMCACHED_PASSWORD, ZULIP__RABBITMQ_PASSWORD,
#   ZULIP__REDIS_PASSWORD, ZULIP__SECRET_KEY, ZULIP__EMAIL_PASSWORD,
#   SETTING_ZULIP_ADMINISTRATOR (email администратора).
#
# Первый запуск Zulip: после успешного деплоя один раз выполните инициализацию БД:
#   docker compose -f compose.coolify.yaml run --rm zulip app:init
# Затем перезапустите стек из Coolify. Далее: generate_realm_creation_link по документации Zulip.
#
# См. https://zulip.readthedocs.io/projects/docker/en/latest/how-to/compose-getting-started.html

secrets:
  zulip__postgres_password:
    environment: "ZULIP__POSTGRES_PASSWORD"
  zulip__memcached_password:
    environment: "ZULIP__MEMCACHED_PASSWORD"
  zulip__rabbitmq_password:
    environment: "ZULIP__RABBITMQ_PASSWORD"
  zulip__redis_password:
    environment: "ZULIP__REDIS_PASSWORD"
  zulip__secret_key:
    environment: "ZULIP__SECRET_KEY"
  zulip__email_password:
    environment: "ZULIP__EMAIL_PASSWORD"

services:
  database:
    image: "zulip/zulip-postgresql:14"
    restart: unless-stopped
    secrets:
      - zulip__postgres_password
    environment:
      POSTGRES_DB: "zulip"
      POSTGRES_USER: "zulip"
      POSTGRES_PASSWORD_FILE: /run/secrets/zulip__postgres_password
    volumes:
      - "postgresql-14:/var/lib/postgresql/data:rw"
    attach: false

  memcached:
    image: "memcached:alpine"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$(cat $$MEMCACHED_PASSWORD_FILE)" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$(cat $$MEMCACHED_PASSWORD_FILE)" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    secrets:
      - zulip__memcached_password
    environment:
      SASL_CONF_PATH: "/home/memcache/memcached.conf"
      MEMCACHED_SASL_PWDB: "/home/memcache/memcached-sasl-db"
      MEMCACHED_PASSWORD_FILE: /run/secrets/zulip__memcached_password
    attach: false

  rabbitmq:
    image: "rabbitmq:4.2"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        export RABBITMQ_DEFAULT_PASS="$$(cat $$RABBITMQ_PASSWORD_FILE)"
        echo 'default_user = $$(RABBITMQ_DEFAULT_USER)' >> /etc/rabbitmq/rabbitmq.conf
        echo 'default_pass = $$(RABBITMQ_DEFAULT_PASS)' >> /etc/rabbitmq/rabbitmq.conf
        exec docker-entrypoint.sh rabbitmq-server
    secrets:
      - zulip__rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_USER: "zulip"
      RABBITMQ_PASSWORD_FILE: /run/secrets/zulip__rabbitmq_password
    volumes:
      - "rabbitmq:/var/lib/rabbitmq:rw"
    attach: false

  redis:
    image: "redis:alpine"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - '/usr/local/bin/docker-entrypoint.sh --requirepass "$$(cat $$REDIS_PASSWORD_FILE)"'
    secrets:
      - zulip__redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/zulip__redis_password
    volumes:
      - "redis:/data:rw"
    attach: false

  zulip:
    image: "ghcr.io/zulip/zulip-server:11.6-1"
    restart: unless-stopped
    # Прокси Coolify ходит на контейнер; не публикуем 80/443/25 на хост (избегаем конфликта с Traefik).
    expose:
      - "80"
    secrets:
      - zulip__postgres_password
      - zulip__memcached_password
      - zulip__rabbitmq_password
      - zulip__redis_password
      - zulip__secret_key
      - zulip__email_password
    environment:
      # Внутренние имена сервисов из этого compose-файла
      SETTING_REMOTE_POSTGRES_HOST: "database"
      SETTING_MEMCACHED_LOCATION: "memcached:11211"
      SETTING_RABBITMQ_HOST: "rabbitmq"
      SETTING_REDIS_HOST: "redis"
      # Обязательные настройки (админ-почта — своя переменная в Coolify)
      SETTING_EXTERNAL_HOST: ${SERVICE_FQDN_ZULIP:?}
      SETTING_ZULIP_ADMINISTRATOR: ${SETTING_ZULIP_ADMINISTRATOR:?}
      # TLS на стороне Coolify; Zulip слушает HTTP :80 и доверяет заголовкам от прокси
      # https://zulip.readthedocs.io/projects/docker/en/latest/how-to/compose-ssl.html#deploying-behind-a-reverse-proxy
      TRUST_GATEWAY_IP: "True"
      # Раскомментируйте при необходимости исходящей почты и задайте переменные в Coolify:
      # SETTING_EMAIL_HOST: ${SETTING_EMAIL_HOST:-}
      # SETTING_EMAIL_HOST_USER: ${SETTING_EMAIL_HOST_USER:-}
      # SETTING_EMAIL_PORT: ${SETTING_EMAIL_PORT:-587}
      # SETTING_EMAIL_USE_TLS: ${SETTING_EMAIL_USE_TLS:-True}
    volumes:
      - "zulip:/data:rw"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576
    depends_on:
      - database
      - memcached
      - rabbitmq
      - redis

volumes:
  zulip:
  postgresql-14:
  rabbitmq:
  redis:
